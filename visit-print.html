<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>طباعة زيارة صفّية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{margin:0;background:#fff}
.wrap{max-width:950px;margin:0 auto;padding:15px}
.header{text-align:center;margin-bottom:8px}
.school{font-size:18px;font-weight:700}
.title{font-size:16px;margin-top:4px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.box{border:1px solid #000;padding:6px;font-size:13px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #000;padding:6px;text-align:center;font-size:12px}
th{background:#f0f0f0}
.left{text-align:right}
.section{margin-top:10px}
.footer{margin-top:15px;display:grid;grid-template-columns:1fr 1fr;gap:30px;text-align:center;font-size:13px}

@media print{

  body{margin:0;padding:0}

  .wrap{
    padding:8px !important;
  }

  .header{margin-bottom:6px}
  .school{font-size:16px}
  .title{font-size:14px}

  .meta{gap:5px;margin-top:6px}
  .box{padding:5px;font-size:12px}

  table{margin-top:8px}
  th,td{
    padding:4px !important;
    font-size:11px !important;
  }

  .section{margin-top:8px}
  .footer{margin-top:12px;font-size:12px}

  button{display:none}

  table,tr,td,th{
    page-break-inside: avoid !important;
  }

  @page{
    size:A4;
    margin:8mm;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div class="school">مدارس الفلاح الأهلية</div>
    <div class="title">نموذج تبادل زيارة صفّية</div>
  </div>

  <div class="meta">
    <div class="box"><b>اليوم:</b> <span id="visitDay"></span></div>
    <div class="box"><b>التاريخ:</b> <span id="visitDate"></span></div>
    <div class="box"><b>المعلم الزائر:</b> <span id="visitorTeacher"></span></div>
    <div class="box"><b>المعلم المُزار:</b> <span id="visitedTeacher"></span></div>
    <div class="box"><b>الفصل:</b> <span id="classText"></span></div>
    <div class="box"><b>الحصة:</b> <span id="periodText"></span></div>
    <div class="box"><b>المادة:</b> <span id="subjectText"></span></div>
    <div class="box"><b>عنوان الدرس:</b> <span id="lessonTitle"></span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>م</th>
        <th class="left">المجال</th>
        <th>ممتاز</th>
        <th>جيد</th>
        <th>متوسط</th>
        <th>إلى حد ما</th>
        <th>لم ينفذ</th>
      </tr>
    </thead>
    <tbody id="evalBody"></tbody>
  </table>

  <div class="section">
    <b>الملاحظات الإيجابية:</b>
    <div class="box" id="positiveNotes"></div>
  </div>

  <div class="section">
    <b>التوصيات:</b>
    <div class="box" id="recommendations"></div>
  </div>

  <div class="footer">
    <div>
      توقيع المعلم الزائر<br><br>…………………
    </div>
    <div>
      توقيع المشرف<br><br>…………………
    </div>
  </div>

  <br>
  <button onclick="window.print()">🖨️ طباعة</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBbUryd9blqEG60L15-L_wU8-NORoHq4r4",
  authDomain: "visit-2026.firebaseapp.com",
  projectId: "visit-2026"
});
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const visitId = params.get("id");
if(!visitId){ alert("رقم الزيارة غير موجود"); }

const questions = [
  "وضوح أهداف الدرس","تسلسل خطوات الدرس","وضوح مخارج الصوت","مناسبة طريقة التدريس",
  "جودة الأسئلة التي تُلقى على الطلاب","مهارة توزيع الأسئلة على الطلاب",
  "تقبل المعلم لآراء ومشاركات الطلاب","جذب انتباه الطلاب",
  "استخدام عبارات التشجيع والتعزيز للطلاب","تمكن المعلم من المادة العلمية",
  "استثمار وقت الحصة","شخصية المعلم","مظهر المعلم","ضبط الطلاب",
  "استخدام السبورة وتنظيمها","استخدام الوسائل المناسبة للدرس",
  "تقويم الدرس في نهاية الحصة","رصد وتسجيل مشاركات وإجابات الطلاب"
];

const body = document.getElementById("evalBody");

const snap = await getDoc(doc(db,"visits",visitId));
const v = snap.data();

visitDay.textContent = v.visitDay || "";
visitDate.textContent = v.visitDate || "";
visitorTeacher.textContent = v.visitorTeacherName || "";
visitedTeacher.textContent = v.visitedTeacherName || "";
classText.textContent = v.classText || "";
periodText.textContent = v.periodText || "";
subjectText.textContent = v.subjectText || "";
lessonTitle.textContent = v.lessonTitle || "";
positiveNotes.textContent = v.positiveNotes || "";
recommendations.textContent = v.recommendations || "";

questions.forEach((q,i)=>{
  const tr=document.createElement("tr");
  tr.innerHTML=`
    <td>${i+1}</td>
    <td class="left">${q}</td>
    ${["ممتاز","جيد","متوسط","إلى حد ما","لم ينفذ"].map(vl=>`
      <td>${v.formAnswers?.["q"+(i+1)]===vl?"✔️":""}</td>
    `).join("")}
  `;
  body.appendChild(tr);
});
</script>

</body>
</html>
